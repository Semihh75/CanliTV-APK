<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Canlı TV</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --accent: #e50914;
    --text: #fff;
    --text2: #b3b3b3;
    --text3: #555;
    --card-w: 165px;
    --card-h: 98px;
    --radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Montserrat', Arial, sans-serif;
    overflow: hidden;
    width: 100vw; height: 100vh;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── NAVBAR ── */
  .navbar {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; align-items: center;
    padding: 0 48px; height: 64px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, transparent 100%);
    z-index: 20; gap: 32px;
  }

  .logo {
    font-size: 26px; font-weight: 900; color: var(--accent);
    letter-spacing: -0.5px; flex-shrink: 0;
    text-shadow: 0 0 20px rgba(229,9,20,0.5);
  }
  .logo span { color: #fff; }

  .nav-links { display: flex; gap: 20px; align-items: center; }

  .nav-link {
    font-size: 13px; font-weight: 600; color: var(--text2);
    cursor: pointer; padding: 5px 0;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    white-space: nowrap;
  }
  .nav-link.active { color: var(--text); border-bottom-color: var(--accent); }
  .nav-link.focused { color: var(--text); outline: none; }

  .live-pill {
    margin-left: auto;
    display: flex; align-items: center; gap: 7px;
    background: rgba(229,9,20,0.12);
    border: 1px solid rgba(229,9,20,0.35);
    padding: 5px 14px; border-radius: 20px;
  }
  .live-dot {
    width: 7px; height: 7px;
    background: var(--accent); border-radius: 50%;
    animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .live-text { font-size: 10px; font-weight: 800; letter-spacing: 2px; color: var(--accent); }

  /* ── HERO ── */
  .hero {
    height: 200px; position: relative;
    flex-shrink: 0; overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background:
      linear-gradient(to right, rgba(13,13,13,0.97) 35%, transparent 72%),
      linear-gradient(to top,   rgba(13,13,13,1)    0%,  transparent 55%),
      radial-gradient(ellipse at 75% 50%, #1c0808 0%, #0d0d0d 65%);
  }
  .hero-content {
    position: absolute; bottom: 24px; left: 48px; z-index: 2;
  }
  .hero-eyebrow {
    font-size: 9px; font-weight: 800; letter-spacing: 4px;
    color: var(--accent); text-transform: uppercase; margin-bottom: 8px;
  }
  .hero-title { font-size: 36px; font-weight: 900; line-height: 1; letter-spacing: -1px; margin-bottom: 6px; }
  .hero-sub { font-size: 12px; color: var(--text2); }

  .hero-stats {
    position: absolute; right: 56px; top: 50%; transform: translateY(-50%);
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .stat {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 7px; padding: 10px 14px; text-align: center;
  }
  .stat-num { font-size: 20px; font-weight: 900; color: var(--accent); line-height: 1; }
  .stat-lbl { font-size: 8px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

  /* ── MAIN LAYOUT ── */
  #home-screen {
    display: flex; flex-direction: column;
    width: 100vw; height: 100vh;
  }

  .content-area {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 8px 48px 32px;
    scrollbar-width: thin; scrollbar-color: #2a2a2a transparent;
  }
  .content-area::-webkit-scrollbar { width: 3px; }
  .content-area::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

  /* ── ROW ── */
  .row { margin-bottom: 28px; }
  .row-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 12px; }
  .row-title { font-size: 15px; font-weight: 700; }
  .row-count {
    font-size: 11px; font-weight: 700; color: var(--accent);
    background: rgba(229,9,20,0.1); padding: 2px 8px; border-radius: 10px;
  }
  .channel-row {
    display: flex; gap: 9px;
    overflow-x: auto; padding-bottom: 4px;
    scrollbar-width: none;
  }
  .channel-row::-webkit-scrollbar { display: none; }

  /* ── CARD ── */
  .channel-card {
    flex-shrink: 0;
    width: var(--card-w); height: var(--card-h);
    border-radius: var(--radius);
    cursor: pointer; position: relative; overflow: hidden;
    border: 2px solid transparent;
    transition: transform 0.15s ease, border-color 0.15s, box-shadow 0.15s;
    background: var(--surface);
  }
  .card-color-layer {
    position: absolute; inset: 0;
    opacity: 0.55; transition: opacity 0.15s;
  }
  .channel-card.focused .card-color-layer { opacity: 0.75; }

  .channel-card.focused {
    transform: scale(1.1);
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 8px 28px rgba(229,9,20,0.45);
    outline: none; z-index: 5;
  }
  .channel-card:hover:not(.focused) {
    transform: scale(1.04);
    border-color: rgba(255,255,255,0.25);
  }

  .card-inner {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 7px; padding: 8px;
  }
  .card-logo-wrap {
    width: 68px; height: 38px;
    display: flex; align-items: center; justify-content: center;
  }
  .card-logo-img {
    max-width: 100%; max-height: 100%; object-fit: contain;
    filter: brightness(1.15) drop-shadow(0 1px 5px rgba(0,0,0,0.9));
  }
  .card-name-text {
    font-size: 11px; font-weight: 700; color: #fff;
    text-align: center; letter-spacing: 0.3px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    line-height: 1.2; max-width: 100%;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-name-sub {
    font-size: 9px; color: rgba(255,255,255,0.65);
    text-align: center; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; max-width: 100%;
  }

  .live-badge {
    position: absolute; top: 6px; right: 6px;
    background: var(--accent); font-size: 8px; font-weight: 800;
    padding: 2px 5px; border-radius: 3px; letter-spacing: 1.5px;
  }
  .play-overlay {
    position: absolute; inset: 0;
    background: rgba(229,9,20,0.0);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s, background 0.15s;
  }
  .channel-card.focused .play-overlay { opacity: 1; background: rgba(229,9,20,0.1); }
  .play-icon {
    width: 30px; height: 30px;
    background: rgba(229,9,20,0.9); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; padding-left: 2px;
  }

  /* ── HINT BAR ── */
  .hint-bar {
    background: rgba(0,0,0,0.7);
    border-top: 1px solid rgba(255,255,255,0.04);
    padding: 6px 48px; display: flex; gap: 22px; flex-shrink: 0;
  }
  .hint-item { font-size: 10px; color: var(--text3); display: flex; align-items: center; gap: 5px; }
  .hint-key {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 3px; padding: 1px 6px;
    font-size: 9px; font-weight: 700; color: var(--text2);
  }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(14px);
    background: rgba(18,18,18,0.97);
    border: 1px solid rgba(229,9,20,0.3);
    border-radius: 6px; padding: 9px 20px;
    font-size: 13px; font-weight: 600; color: var(--text);
    z-index: 9999; opacity: 0; transition: all 0.22s;
    pointer-events: none; backdrop-filter: blur(10px);
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  :focus { outline: none; }
</style>
</head>

// ═══════════════════════════════════════════════════
// BUILD HOME GRID
// ═══════════════════════════════════════════════════
function buildHome() {
  const container = document.getElementById('content-area');
  container.innerHTML = '';
  const activeCat = document.querySelector('.nav-link.active')?.dataset.cat || 'all';

  SECTIONS.forEach(sec => {
    if (activeCat !== 'all' && sec.cat !== activeCat) return;

    const rowDiv = document.createElement('div');
    rowDiv.className = 'row';
    rowDiv.innerHTML = `
      <div class="row-header">
        <div class="row-title">${sec.label}</div>
        <div class="row-count">${sec.channels.length}</div>
      </div>
      <div class="channel-row" id="row-${sec.id}"></div>
    `;
    container.appendChild(rowDiv);

    const row = rowDiv.querySelector('.channel-row');
    sec.channels.forEach((ch, i) => {
      const card = document.createElement('div');
      card.className = 'channel-card';
      card.tabIndex = 0;
      card.dataset.slug = ch.slug;
      card.dataset.name = ch.name;
      card.dataset.section = sec.id;
      card.dataset.idx = i;

      const pageUrl = `https://www.canlitv.me/live/${ch.slug}`;
      const logoUrl = `https://www.canlitv.me/resim/${ch.slug}.png`;

      card.innerHTML = `
        <div class="card-color-layer" style="background: linear-gradient(135deg, ${ch.color} 0%, #0d0d0d 100%)"></div>
        <div class="card-inner">
          <div class="card-logo-wrap">
            <div class="card-name-text">${ch.name}</div>
          </div>
          <div class="card-name-sub">${ch.name}</div>
        </div>
        <div class="live-badge">CANLI</div>
        <div class="play-overlay"><div class="play-icon">▶</div></div>
      `;

      // Probeer logo te laden
      const img = new Image();
      img.onload = () => {
        const wrap = card.querySelector('.card-logo-wrap');
        wrap.innerHTML = `<img class="card-logo-img" src="${img.src}" alt="${ch.name}">`;
      };
      img.src = logoUrl;

      // KLIK → open via Android bridge → PlayerActivity
      card.addEventListener('click', () => {
        showToast(`${ch.name} açılıyor…`);
        if (window.TVBridge) {
          // Roep de Android Java bridge aan — opent PlayerActivity
          window.TVBridge.openChannel(pageUrl, ch.name, img.complete ? img.src : '');
        } else {
          // Fallback voor testen in browser: navigeer direct
          window.location.href = pageUrl;
        }
      });

      row.appendChild(card);
    });
  });
}

// ═══════════════════════════════════════════════════
// CATEGORY FILTER
// ═══════════════════════════════════════════════════
document.getElementById('cat-nav').addEventListener('click', e => {
  const link = e.target.closest('.nav-link');
  if (!link) return;
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
  link.classList.add('active');
  buildHome();
  setTimeout(() => {
    const first = document.querySelector('.channel-card');
    if (first) first.focus();
  }, 50);
});

// ═══════════════════════════════════════════════════
// KEYBOARD NAVIGATIE (TV afstandsbediening)
// ═══════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  const key = e.key;
  const navLinks = Array.from(document.querySelectorAll('.nav-link'));
  const cards = Array.from(document.querySelectorAll('.channel-card'));
  const cur = document.activeElement;

  if (key === 'Enter' || key === ' ') {
    e.preventDefault();
    if (cur.classList.contains('channel-card')) cur.click();
    else if (cur.classList.contains('nav-link')) cur.click();
    return;
  }

  const isCard = cur.classList.contains('channel-card');
  const isNav  = cur.classList.contains('nav-link');

  if (key === 'ArrowDown') {
    e.preventDefault();
    if (isNav) {
      const first = cards[0];
      if (first) { first.focus(); first.scrollIntoView({ block: 'nearest' }); }
    } else if (isCard) {
      const rows = Array.from(document.querySelectorAll('.channel-row'));
      const curRow = cur.parentElement;
      const rowIdx = rows.indexOf(curRow);
      const colIdx = Array.from(curRow.children).indexOf(cur);
      if (rowIdx < rows.length - 1) {
        const nextCards = Array.from(rows[rowIdx + 1].querySelectorAll('.channel-card'));
        const t = nextCards[Math.min(colIdx, nextCards.length - 1)];
        if (t) { t.focus(); t.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
      }
    }
    return;
  }

  if (key === 'ArrowUp') {
    e.preventDefault();
    if (isCard) {
      const rows = Array.from(document.querySelectorAll('.channel-row'));
      const curRow = cur.parentElement;
      const rowIdx = rows.indexOf(curRow);
      const colIdx = Array.from(curRow.children).indexOf(cur);
      if (rowIdx > 0) {
        const prevCards = Array.from(rows[rowIdx - 1].querySelectorAll('.channel-card'));
        const t = prevCards[Math.min(colIdx, prevCards.length - 1)];
        if (t) { t.focus(); t.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
      } else {
        navLinks[0]?.focus();
      }
    }
    return;
  }

  // Links/rechts navigeren
  const focusable = [...navLinks, ...cards].filter(el => el.offsetParent !== null);
  const idx = focusable.indexOf(cur);
  if (key === 'ArrowRight' && idx < focusable.length - 1) {
    e.preventDefault();
    focusable[idx + 1].focus();
    focusable[idx + 1].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
  } else if (key === 'ArrowLeft' && idx > 0) {
    e.preventDefault();
    focusable[idx - 1].focus();
    focusable[idx - 1].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
  }
});

// Focus styling
document.addEventListener('focusin',  e => e.target.classList.add('focused'));
document.addEventListener('focusout', e => e.target.classList.remove('focused'));

// ═══════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
buildHome();
setTimeout(() => {
  const first = document.querySelector('.channel-card');
  if (first) first.focus();
}, 150);
</script>
