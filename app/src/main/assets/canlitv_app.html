<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Canlı TV</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #141420;
    --surface2: #1e1e2e;
    --accent: #e50914;
    --accent2: #ff6b35;
    --text: #ffffff;
    --text2: #aaaacc;
    --text3: #666688;
    --card-w: 160px;
    --card-h: 95px;
    --radius: 8px;
    --focused: #e50914;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ─── SCREENS ─── */
  .screen { position: absolute; inset: 0; display: none; flex-direction: column; }
  .screen.active { display: flex; }

  /* ─── HOME SCREEN ─── */
  #home-screen {
    background: var(--bg);
  }

  .header {
    display: flex;
    align-items: center;
    padding: 18px 30px 12px;
    gap: 30px;
    background: linear-gradient(to bottom, rgba(10,10,15,0.98) 0%, rgba(10,10,15,0.0) 100%);
    position: relative;
    z-index: 10;
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--accent);
    letter-spacing: 2px;
    flex-shrink: 0;
  }

  .nav-tabs {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .nav-tab {
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
    border: 1.5px solid transparent;
    white-space: nowrap;
  }

  .nav-tab.active-cat { color: var(--text); background: var(--accent); }
  .nav-tab.focused { border-color: var(--text); color: var(--text); outline: none; }

  .hero-section {
    position: relative;
    flex-shrink: 0;
    height: 200px;
    overflow: hidden;
    margin: 0;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #1a0a2e 0%, #0d1a3a 50%, #1a0d2e 100%);
  }

  .hero-content {
    position: absolute;
    bottom: 20px;
    left: 30px;
    z-index: 2;
  }

  .hero-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--accent2);
    font-weight: 600;
    margin-bottom: 6px;
  }

  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 1px;
    line-height: 1;
    margin-bottom: 8px;
  }

  .hero-desc {
    font-size: 12px;
    color: var(--text2);
    max-width: 300px;
  }

  .hero-decoration {
    position: absolute;
    right: 30px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .hero-badge {
    background: var(--accent);
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .live-dot {
    width: 8px;
    height: 8px;
    background: #00ff88;
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  .channels-container {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0 30px 30px;
    scrollbar-width: thin;
    scrollbar-color: var(--accent) transparent;
  }

  .channels-container::-webkit-scrollbar { width: 4px; }
  .channels-container::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }
  .channels-container::-webkit-scrollbar-track { background: transparent; }

  .row-section { margin-bottom: 28px; }

  .row-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .row-title-accent {
    width: 3px;
    height: 16px;
    background: var(--accent);
    border-radius: 2px;
  }

  .channel-row {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 8px;
    scrollbar-width: none;
  }

  .channel-row::-webkit-scrollbar { display: none; }

  .channel-card {
    flex-shrink: 0;
    width: var(--card-w);
    height: var(--card-h);
    background: var(--surface);
    border-radius: var(--radius);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .channel-card:hover {
    transform: scale(1.05);
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(229,9,20,0.4);
  }

  .channel-card.focused {
    transform: scale(1.08);
    border-color: var(--focused);
    box-shadow: 0 0 25px rgba(229,9,20,0.6), 0 0 0 2px rgba(229,9,20,0.3);
    outline: none;
    z-index: 5;
  }

  .channel-card-bg {
    position: absolute;
    inset: 0;
    opacity: 0.15;
    background: linear-gradient(135deg, var(--accent) 0%, transparent 70%);
  }

  .channel-logo-container {
    width: 50px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .channel-logo-img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    filter: brightness(1.1);
  }

  .channel-logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    color: var(--text);
    text-align: center;
    letter-spacing: 1px;
  }

  .channel-name {
    font-size: 11px;
    font-weight: 500;
    color: var(--text2);
    text-align: center;
    padding: 0 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }

  .live-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    background: var(--accent);
    font-size: 9px;
    font-weight: 700;
    padding: 2px 5px;
    border-radius: 3px;
    letter-spacing: 0.5px;
  }

  /* ─── PLAYER SCREEN ─── */
  #player-screen {
    background: #000;
    position: relative;
  }

  #iframe-wrapper {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  #channel-iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* Player overlay UI */
  #player-overlay {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }

  #player-overlay.visible { opacity: 1; pointer-events: all; }

  /* Gradient overlays */
  .overlay-top {
    background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
    padding: 16px 20px 30px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .overlay-bottom {
    margin-top: auto;
    background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 100%);
    padding: 30px 20px 16px;
  }

  /* Back button */
  .back-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    border: 1.5px solid rgba(255,255,255,0.3);
    font-size: 16px;
    transition: all 0.2s;
    backdrop-filter: blur(4px);
  }

  .back-btn:hover, .back-btn.focused { background: var(--accent); border-color: var(--accent); transform: scale(1.1); }

  .player-channel-info { flex: 1; }

  .player-channel-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    line-height: 1;
  }

  .player-live-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--accent);
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    margin-top: 4px;
    letter-spacing: 1px;
  }

  /* Yayin tabs */
  .yayin-section { margin-bottom: 10px; }

  .yayin-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text3);
    margin-bottom: 8px;
    font-weight: 600;
  }

  .yayin-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .yayin-tab {
    padding: 8px 16px;
    border-radius: 6px;
    border: 1.5px solid rgba(255,255,255,0.2);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    background: rgba(255,255,255,0.08);
    color: var(--text2);
    transition: all 0.2s;
    backdrop-filter: blur(8px);
    min-width: 70px;
    text-align: center;
  }

  .yayin-tab:hover { border-color: var(--accent); color: var(--text); }
  .yayin-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .yayin-tab.focused { border-color: #fff; color: #fff; box-shadow: 0 0 12px rgba(229,9,20,0.5); outline: none; transform: scale(1.05); }
  .yayin-tab.active.focused { box-shadow: 0 0 15px rgba(229,9,20,0.8); }

  /* Quality selector */
  .quality-section { display: flex; align-items: center; gap: 12px; }

  .quality-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text3);
    font-weight: 600;
    white-space: nowrap;
  }

  .quality-tabs {
    display: flex;
    gap: 6px;
  }

  .quality-tab {
    padding: 6px 12px;
    border-radius: 5px;
    border: 1.5px solid rgba(255,255,255,0.15);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    background: rgba(255,255,255,0.06);
    color: var(--text3);
    transition: all 0.2s;
    backdrop-filter: blur(8px);
  }

  .quality-tab:hover { border-color: rgba(255,255,255,0.4); color: var(--text2); }
  .quality-tab.active { background: rgba(255,165,0,0.25); border-color: #ffb347; color: #ffb347; }
  .quality-tab.focused { border-color: #fff; color: #fff; outline: none; transform: scale(1.08); box-shadow: 0 0 10px rgba(255,255,255,0.3); }
  .quality-tab.active.focused { box-shadow: 0 0 12px rgba(255,179,71,0.6); }

  /* Bottom controls row */
  .player-controls-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 16px;
  }

  /* Loading state */
  #player-loading {
    position: absolute;
    inset: 0;
    z-index: 20;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    transition: opacity 0.5s;
  }

  #player-loading.hidden { opacity: 0; pointer-events: none; }

  .spinner {
    width: 44px;
    height: 44px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 13px;
    color: var(--text2);
    font-weight: 500;
    letter-spacing: 1px;
  }

  .loading-channel {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: 2px;
  }

  /* Focus ring for accessibility */
  :focus { outline: none; }

  /* Channel number badge on card */
  .channel-number {
    position: absolute;
    bottom: 6px;
    left: 8px;
    font-size: 9px;
    color: var(--text3);
    font-weight: 600;
  }

  /* Scrollbar for channels-container custom */
  .channels-container::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }

  /* Toast notification */
  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(30,30,46,0.95);
    border: 1px solid rgba(229,9,20,0.4);
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);
    z-index: 1000;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    backdrop-filter: blur(10px);
    white-space: nowrap;
  }

  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Channel info panel on player */
  .player-channel-logo {
    width: 40px;
    height: 28px;
    object-fit: contain;
    filter: brightness(1.2) drop-shadow(0 0 4px rgba(255,255,255,0.3));
  }

  /* Instruction hint */
  .hint-bar {
    background: rgba(20,20,32,0.7);
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 6px 20px;
    display: flex;
    gap: 20px;
    flex-shrink: 0;
  }

  .hint-item {
    font-size: 10px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .hint-key {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 9px;
    font-weight: 600;
    color: var(--text2);
  }
</style>
</head>

</div>

<!-- PLAYER SCREEN -->
<div id="player-screen" class="screen">

        <div class="player-live-badge">

          CANLI

    </div>

    <!-- Bottom bar -->
    <div class="overlay-bottom">
      <div class="player-controls-row">
        <!-- Yayin tabs -->
        <div class="yayin-section">
          <div class="yayin-label">Yayın Kaynağı</div>
          <div class="yayin-tabs" id="yayin-tabs">
            <div class="yayin-tab active focused" data-yayin="1" tabindex="0">1. Yayın</div>
            <div class="yayin-tab" data-yayin="2" tabindex="0">2. Yayın</div>

            <div class="yayin-tab" data-yayin="4" tabindex="0">4. Yayın</div>
          </div>
        </div>

        <!-- Quality -->
        <div class="quality-section">
          <div class="quality-label">Kalite</div>
          <div class="quality-tabs" id="quality-tabs">
            <div class="quality-tab" data-q="360" tabindex="0">360p</div>
            <div class="quality-tab" data-q="480" tabindex="0">480p</div>
            <div class="quality-tab active" data-q="720" tabindex="0">720p</div>
            <div class="quality-tab" data-q="HD" tabindex="0">HD</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

};

// Active state
let currentSlug = '';
let currentYayin = 1;
let currentQuality = '720';
let overlayTimer = null;
let focusedEl = null;
let currentScreen = 'home';

// DOM refs
const homeScreen    = document.getElementById('home-screen');
const playerScreen  = document.getElementById('player-screen');
const iframe        = document.getElementById('channel-iframe');
const overlay       = document.getElementById('player-overlay');
const loadingEl     = document.getElementById('player-loading');
const loadingName   = document.getElementById('loading-name');
const playerName    = document.getElementById('player-channel-name');
const backBtn       = document.getElementById('back-btn');

// ─── BUILD HOME ──────────────────────────────────────────────
function buildHome() {
  const container = document.getElementById('channels-container');
  container.innerHTML = '';

  const activeCat = document.querySelector('.nav-tab.active-cat')?.dataset.cat || 'all';

  for (const [key, section] of Object.entries(CHANNELS)) {
    // Filter by category
    if (activeCat !== 'all' && section.cat !== activeCat && activeCat !== section.cat) {
      // Check if any channel in section matches
      const hasMatch = section.channels.length > 0;
      if (section.cat !== activeCat) continue;
    }

    const row = document.createElement('div');
    row.className = 'row-section';
    row.dataset.section = key;

    row.innerHTML = `
      <div class="row-title">
        <div class="row-title-accent"></div>
        ${section.label}
      </div>
      <div class="channel-row" id="row-${key}"></div>
    `;

    container.appendChild(row);

    const channelRow = row.querySelector('.channel-row');
    section.channels.forEach((ch, i) => {
      const card = document.createElement('div');
      card.className = 'channel-card';
      card.dataset.slug = ch.slug;
      card.dataset.name = ch.name;
      card.tabIndex = 0;
      card.setAttribute('data-section', key);
      card.setAttribute('data-idx', i);

      card.innerHTML = `
        <div class="channel-card-bg" style="background: linear-gradient(135deg, ${ch.color} 0%, transparent 70%)"></div>
        <div class="channel-logo-container">
          <div class="channel-logo-text">${ch.name}</div>
        </div>
        <div class="channel-name">${ch.name}</div>
        <div class="live-badge">CANLI</div>
      `;

      card.addEventListener('click', () => openChannel(ch.slug, ch.name));
      card.addEventListener('focus', () => { focusedEl = card; });
      channelRow.appendChild(card);
    });
  }
}

// ─── CATEGORY FILTER ─────────────────────────────────────────
document.getElementById('cat-tabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.nav-tab');
  if (!tab) return;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active-cat'));
  tab.classList.add('active-cat');
  buildHome();
});

// ─── OPEN CHANNEL ────────────────────────────────────────────
function openChannel(slug, name) {
  currentSlug = slug;
  currentYayin = 1;

  // Show player
  homeScreen.classList.remove('active');
  playerScreen.classList.add('active');
  currentScreen = 'player';

  // Reset yayin tabs
  document.querySelectorAll('.yayin-tab').forEach((t, i) => {
    t.classList.toggle('active', i === 0);
    t.classList.remove('focused');
  });

  // Load
  loadingName.textContent = name.toUpperCase();
  playerName.textContent = name.toUpperCase();
  loadingEl.classList.remove('hidden');
  overlay.classList.remove('visible');

  loadIframe(slug, 1);
  showToast(`${name} açılıyor...`);

  // Auto-focus back btn after load
  setTimeout(() => backBtn.focus(), 600);
}

// ─── LOAD IFRAME ─────────────────────────────────────────────
function loadIframe(slug, yayin) {
  const url = `https://www.canlitv.me/live/${slug}/${yayin}`;
  iframe.src = url;

  iframe.onload = () => {
    setTimeout(() => {
      loadingEl.classList.add('hidden');
    }, 800);
  };

  // Fallback timeout
  setTimeout(() => {
    loadingEl.classList.add('hidden');
  }, 4000);
}

// ─── YAYIN TABS ──────────────────────────────────────────────
document.getElementById('yayin-tabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.yayin-tab');
  if (!tab) return;

  const yayin = parseInt(tab.dataset.yayin);
  currentYayin = yayin;

  document.querySelectorAll('.yayin-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');

  loadingEl.classList.remove('hidden');
  loadingEl.style.opacity = '1';
  loadingEl.style.pointerEvents = 'all';

  loadIframe(currentSlug, yayin);
  showToast(`${yayin}. Yayın yükleniyor...`);
});

// ─── QUALITY TABS ────────────────────────────────────────────
document.getElementById('quality-tabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.quality-tab');
  if (!tab) return;

  currentQuality = tab.dataset.q;
  document.querySelectorAll('.quality-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  showToast(`Kalite: ${currentQuality}`);
  // Quality is informational – actual quality depends on source stream
});

// ─── BACK BUTTON ─────────────────────────────────────────────
backBtn.addEventListener('click', goHome);
function goHome() {
  playerScreen.classList.remove('active');
  homeScreen.classList.add('active');
  currentScreen = 'home';
  iframe.src = 'about:blank';
  loadingEl.classList.remove('hidden');
  overlay.classList.remove('visible');
}

// ─── OVERLAY TOGGLE ──────────────────────────────────────────
playerScreen.addEventListener('click', (e) => {
  if (e.target === playerScreen || e.target.id === 'iframe-wrapper' || e.target.id === 'channel-iframe') {
    toggleOverlay();
  }
});

function toggleOverlay() {
  if (overlay.classList.contains('visible')) {
    overlay.classList.remove('visible');
  } else {
    overlay.classList.add('visible');
    resetOverlayTimer();
  }
}

function showOverlay() {
  overlay.classList.add('visible');
  resetOverlayTimer();
}

function resetOverlayTimer() {
  clearTimeout(overlayTimer);
  overlayTimer = setTimeout(() => {
    overlay.classList.remove('visible');
  }, 5000);
}

// ─── KEYBOARD / TV REMOTE NAVIGATION ─────────────────────────
document.addEventListener('keydown', (e) => {
  const key = e.key;

  if (currentScreen === 'home') {
    handleHomeKeys(e, key);
  } else {
    handlePlayerKeys(e, key);
  }
});

function handleHomeKeys(e, key) {
  const focusable = Array.from(document.querySelectorAll(
    '#home-screen .nav-tab, #home-screen .channel-card'
  )).filter(el => el.offsetParent !== null);

  const current = document.activeElement;
  const idx = focusable.indexOf(current);

  if (key === 'Enter' || key === ' ') {
    e.preventDefault();
    if (current.classList.contains('channel-card')) {
      openChannel(current.dataset.slug, current.dataset.name);
    } else if (current.classList.contains('nav-tab')) {
      current.click();
    }
    return;
  }

  if (key === 'ArrowRight' && idx >= 0 && idx < focusable.length - 1) {
    e.preventDefault();
    focusable[idx + 1].focus();
    focusable[idx + 1].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
    return;
  }

  if (key === 'ArrowLeft' && idx > 0) {
    e.preventDefault();
    focusable[idx - 1].focus();
    focusable[idx - 1].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
    return;
  }

  if (key === 'ArrowDown' || key === 'ArrowUp') {
    e.preventDefault();
    // Find cards in rows and navigate vertically
    const cards = Array.from(document.querySelectorAll('#home-screen .channel-card'));
    const rows = Array.from(document.querySelectorAll('.channel-row'));

    const currentCard = current.classList.contains('channel-card') ? current : null;
    if (!currentCard) {
      // From nav tabs, go to first card
      if (key === 'ArrowDown' && cards.length > 0) {
        cards[0].focus();
        cards[0].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
      return;
    }

    const currentRow = currentCard.parentElement;
    const rowIdx = rows.indexOf(currentRow);
    const colIdx = Array.from(currentRow.children).indexOf(currentCard);

    if (key === 'ArrowDown' && rowIdx < rows.length - 1) {
      const nextRow = rows[rowIdx + 1];
      const nextCards = Array.from(nextRow.children).filter(c => c.classList.contains('channel-card'));
      const targetIdx = Math.min(colIdx, nextCards.length - 1);
      if (nextCards[targetIdx]) {
        nextCards[targetIdx].focus();
        nextCards[targetIdx].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    } else if (key === 'ArrowUp' && rowIdx > 0) {
      const prevRow = rows[rowIdx - 1];
      const prevCards = Array.from(prevRow.children).filter(c => c.classList.contains('channel-card'));
      const targetIdx = Math.min(colIdx, prevCards.length - 1);
      if (prevCards[targetIdx]) {
        prevCards[targetIdx].focus();
        prevCards[targetIdx].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    } else if (key === 'ArrowUp' && rowIdx === 0) {
      // Go to nav tabs
      const navTabs = document.querySelectorAll('.nav-tab');
      if (navTabs.length) navTabs[0].focus();
    }
  }
}

function handlePlayerKeys(e, key) {
  if (key === 'Backspace' || key === 'Escape' || key === 'GoBack') {
    e.preventDefault();
    if (overlay.classList.contains('visible')) {
      overlay.classList.remove('visible');
    } else {
      goHome();
    }
    return;
  }

  if (key === 'Enter' || key === ' ') {
    const active = document.activeElement;
    if (active && active !== document.body) {
      e.preventDefault();
      active.click();
      return;
    }
    // Toggle overlay
    e.preventDefault();
    toggleOverlay();
    return;
  }

  // Show overlay on any key
  showOverlay();

  if (!overlay.classList.contains('visible')) return;

  const focusable = Array.from(document.querySelectorAll(
    '#player-overlay .back-btn, #player-overlay .yayin-tab, #player-overlay .quality-tab'
  ));

  const current = document.activeElement;
  const idx = focusable.indexOf(current);

  if (key === 'ArrowRight' && idx >= 0 && idx < focusable.length - 1) {
    e.preventDefault();
    focusable[idx + 1].focus();
  } else if (key === 'ArrowLeft' && idx > 0) {
    e.preventDefault();
    focusable[idx - 1].focus();
  } else if (key === 'ArrowDown') {
    e.preventDefault();
    // Move from back btn or yayin to quality row
    const yayinTabs = Array.from(document.querySelectorAll('.yayin-tab'));
    const qualityTabs = Array.from(document.querySelectorAll('.quality-tab'));

    if (current === backBtn || yayinTabs.includes(current)) {
      // Go to quality tabs
      const activeQ = document.querySelector('.quality-tab.active') || qualityTabs[0];
      if (activeQ) activeQ.focus();
    }
  } else if (key === 'ArrowUp') {
    e.preventDefault();
    const qualityTabs = Array.from(document.querySelectorAll('.quality-tab'));
    if (qualityTabs.includes(current)) {
      // Go to yayin tabs
      const activeY = document.querySelector('.yayin-tab.active') || document.querySelector('.yayin-tab');
      if (activeY) activeY.focus();
    } else {
      backBtn.focus();
    }
  }

  if (idx >= 0) {
    focusable[idx]?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// Android TV Back button (via keycode 4 / 27)
window.addEventListener('keyup', (e) => {
  if (e.keyCode === 4 || e.key === 'Back') {
    if (currentScreen === 'player') goHome();
  }
});

// ─── FOCUS STYLES (add/remove class) ─────────────────────────
document.addEventListener('focusin', (e) => {
  const el = e.target;
  el.classList.add('focused');
});

document.addEventListener('focusout', (e) => {
  const el = e.target;
  el.classList.remove('focused');
});

// ─── TOAST ───────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

// ─── INIT ────────────────────────────────────────────────────
buildHome();

// Set initial focus
setTimeout(() => {
  const firstCard = document.querySelector('.channel-card');
  if (firstCard) firstCard.focus();
}, 100);
</script>
